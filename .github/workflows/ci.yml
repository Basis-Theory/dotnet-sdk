name: ci

on:
  pull_request:
    branches: [master]

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 9.x

      - name: Install tools
        run: |
          dotnet tool restore

      - name: Build Release
        run: dotnet build BasisTheory.Client.slnx -c Release /p:ContinuousIntegrationBuild=true

  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 9.x

      - name: Install tools
        run: |
          dotnet tool restore

      - name: Run Tests
        run: |
          dotnet test BasisTheory.Client.slnx
        env:
          BT_API_URL: https://api.flock-dev.com
          BT_MGT_API_KEY: ${{ secrets.BT_SDK_INT_TEST_MGT_API_KEY }}
          BT_PVT_API_KEY: ${{ secrets.BT_SDK_INT_TEST_PVT_API_KEY }}
          BT_MGT_TEST_API_KEY: ${{ secrets.BT_SDK_INT_TEST_MGT_TEST_API_KEY }}
          BT_PVT_TEST_API_KEY: ${{ secrets.BT_SDK_INT_TEST_PVT_TEST_API_KEY }}